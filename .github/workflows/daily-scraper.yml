name: Daily Sharesansar Scraper

on:
  schedule:
    - cron: "15 11 * * *"  # 5:00 PM Nepal Time (11:15 UTC)
  workflow_dispatch:

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4 gspread google-auth oauth2client pytz
      
      - name: Run Sharesansar Scraper
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python sss.py